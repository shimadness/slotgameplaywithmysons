<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>TRIPLE SLOT</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- 起動エラー可視化（黒画面デバッグ用。原因特定したら削除予定） -->
    <div
      id="boot-error"
      style="position: fixed; inset: 0; z-index: 99999; display: none; padding: 16px; padding-top: 60px; margin: 0; overflow: auto; color: #ffd2d2; background: #240010; font: 12px/1.5 ui-monospace, monospace; white-space: pre-wrap; word-break: break-word;"
    ></div>
    <script>
      (function () {
        function show(label, info) {
          var d = document.getElementById("boot-error");
          if (!d) return;
          d.style.display = "block";
          d.textContent += "[" + label + "] " + info + "\n\n";
        }
        window.addEventListener(
          "error",
          function (e) {
            // リソース読込失敗（script/asset の 404 など）も拾う
            if (e.target && e.target !== window && (e.target.src || e.target.href)) {
              show("load-failed", (e.target.tagName || "") + " " + (e.target.src || e.target.href));
              return;
            }
            show(
              "error",
              (e.message || e.type) +
                "\n" + (e.filename || "") + ":" + (e.lineno || "") + ":" + (e.colno || "") +
                "\n" + ((e.error && e.error.stack) || "")
            );
          },
          true
        );
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason || {};
          show("promise", (r && (r.stack || r.message)) || String(r));
        });
        // 実機メトリクスを上部バナーに常時表示（原因確定用）。zoom が rect に効くかも測る。
        setTimeout(function () {
          try {
            var cab = document.querySelector(".cabinet");
            if (!cab) { show("DIAG", "no .cabinet"); return; }
            var nat = cab.getBoundingClientRect();
            // WebKit で zoom が getBoundingClientRect に反映されるか実測
            var prevZoom = cab.style.zoom;
            cab.style.zoom = "0.5";
            var zoomed = cab.getBoundingClientRect();
            cab.style.zoom = prevZoom;
            var zoomAffectsRect = Math.abs(zoomed.height - nat.height) > 5;

            var padCs = getComputedStyle(document.body);
            var padV = parseFloat(padCs.paddingTop) + parseFloat(padCs.paddingBottom);
            var wouldScale = Math.min(1, (window.innerHeight - padV) / nat.height);

            var b = document.createElement("div");
            b.style.cssText =
              "position:fixed;top:0;left:0;right:0;z-index:99998;" +
              "background:rgba(10,0,20,.92);color:#9ff;font:11px/1.4 ui-monospace,monospace;" +
              "padding:4px 6px;white-space:pre-wrap;pointer-events:none;";
            b.textContent =
              "ih=" + window.innerHeight + " iw=" + window.innerWidth +
              " natH=" + Math.round(nat.height) + " natW=" + Math.round(nat.width) +
              " | zoom→rect=" + (zoomAffectsRect ? "YES" : "NO") +
              " | wouldScale=" + wouldScale.toFixed(3) +
              " | ios=" + (document.documentElement.className.indexOf("native-ios") >= 0);
            document.body.appendChild(b);
          } catch (err) {
            show("DIAG-failed", String(err));
          }
        }, 1500);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
